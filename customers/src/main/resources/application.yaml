spring:
  application:
    name: customers
  datasource:
    url: jdbc:postgresql://localhost:5555/ecommerce_customers
    username: postgres
    password: password
    driver-class-name: org.postgresql.Driver
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    show-sql: true
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    baseline-on-migrate: true
    fail-on-missing-locations: true

server:
  port: 8082